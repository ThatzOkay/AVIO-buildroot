name: Build webkitgtk

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ensure-release:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure the 'prebuilt-artifacts' release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view prebuilt-artifacts --repo "${{ github.repository }}" >/dev/null 2>&1 || \
          gh release create prebuilt-artifacts \
            --repo "${{ github.repository }}" \
            --title "Prebuilt package output trees" \
            --notes "Auto-published by package-prebuild workflows (e.g. Build webkitgtk). Assets are overwritten (--clobber) on every run; do not depend on a specific historical version." \
            --target main

  build-and-publish:
    needs: ensure-release
    runs-on: ubuntu-latest
    timeout-minutes: 330
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: rpi4-webkitgtk
            board: raspberrypi4
          - service: rpi5-webkitgtk
            board: raspberrypi5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check producer/consumer defconfig sync
        run: bash avio_configs/scripts/check-toolchain-sync.sh

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache

      - name: Download prebuilt toolchain
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "toolchains/${{ matrix.board }}"
          if ! gh release download toolchains \
              --repo "${{ github.repository }}" \
              --pattern "toolchain-${{ matrix.board }}.tar.gz" \
              --output "toolchain-${{ matrix.board }}.tar.gz" \
              --clobber; then
            echo "::error::No prebuilt toolchain asset for ${{ matrix.board }} on the 'toolchains' release. Run the 'Build toolchain' workflow (workflow_dispatch) first."
            exit 1
          fi
          tar xzf "toolchain-${{ matrix.board }}.tar.gz" -C "toolchains/${{ matrix.board }}"
          chmod -R 777 toolchains
          "toolchains/${{ matrix.board }}/relocate-sdk.sh" "/app/toolchains/${{ matrix.board }}"

      - name: Prepare bind-mounted directories
        run: |
          mkdir -p .ccache images
          chmod -R 777 .ccache images

      - name: Build ${{ matrix.board }} webkitgtk
        run: docker compose run --rm ${{ matrix.service }}

      - name: Publish webkitgtk prebuild to the 'prebuilt-artifacts' release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload prebuilt-artifacts images/webkitgtk-${{ matrix.board }}.tar.gz.part-* \
            --repo "${{ github.repository }}" --clobber

      - name: Upload webkitgtk prebuild as a workflow artifact (debug/inspection)
        uses: actions/upload-artifact@v4
        with:
          name: webkitgtk-${{ matrix.board }}
          path: images/webkitgtk-${{ matrix.board }}.tar.gz.part-*
          if-no-files-found: error
